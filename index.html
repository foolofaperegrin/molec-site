<!DOCTYPE html>
<html>
<head>
  <title>MOLEC</title>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: "Molecular";
      src: url("fonts/molecular.ttf") format("truetype");
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #e8e8e8;
      text-align: center;
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    h1 {
      font-family: "Molecular", sans-serif;
      font-size: 48px;
      color: #8aff8a;
      letter-spacing: 4px;
      text-shadow:
        0 0 5px #00ffff,
        0 0 5px #00ffff,
        0 0 12px #00ffff,
        0 0 20px #00ffff;
    }

    video {
      width: 100%;
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin-top: 20px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
    }

<body>

<h1>MOLEC</h1>

<p>
Build strange mechanical organisms in a microscopic ocean.
</p>

<video controls>
  <source src="video.mp4" type="video/mp4">
</video>

<p>
A modular creature-building roguelike where movement emerges from physics.
</p>

<h3>Follow development</h3>

<input type="email" placeholder="your email">
<button>Join</button>

</html>
