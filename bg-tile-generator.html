<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MOLEC — Background Tile Generator</title>
    <style>
      :root {
        --bg: #010c08;
        --panel: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.12);
        --text: #dce7e4;
        --muted: rgba(220, 231, 228, 0.72);
        --accent: #f3974c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial,
          sans-serif;
        color: var(--text);
        background: radial-gradient(
            circle at top,
            rgba(0, 255, 255, 0.08),
            transparent 32%
          ),
          linear-gradient(180deg, #01201f 0%, #010c08 100%);
      }

      .wrap {
        width: min(1100px, calc(100% - 32px));
        margin: 24px auto 60px;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 18px;
        align-items: start;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .panel {
        padding: 16px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(6px);
      }

      .hint {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      input[type="number"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
      }

      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      input[type="color"] {
        width: 100%;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 12px;
        padding: 6px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      button {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(243, 151, 76, 0.14);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.06);
      }

      canvas {
        width: 100%;
        height: auto;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.18);
        display: block;
      }

      .out {
        padding: 16px;
      }

      .meta {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>Background tile generator</h1>
        <p class="hint">
          Generates a single PNG tile you can use with
          <code>background-repeat: repeat</code>. It uses your existing
          icon files (white icons with alpha) and tints them between two colors.
        </p>

        <div class="row">
          <label>
            Tile size (px)
            <input id="tileSize" type="number" min="128" step="64" value="1024" />
          </label>
          <label>
            Seed (any text)
            <input id="seed" type="text" value="molec" />
          </label>
        </div>

        <div class="row">
          <label>
            Min icon size (px)
            <input id="minSize" type="number" min="4" step="1" value="18" />
          </label>
          <label>
            Max icon size (px)
            <input id="maxSize" type="number" min="4" step="1" value="64" />
          </label>
        </div>

        <div class="row">
          <label>
            Coverage (0..1)
            <input
              id="coverage"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.35"
            />
          </label>
          <label>
            Max icons
            <input id="maxIcons" type="number" min="1" step="1" value="120" />
          </label>
        </div>

        <div class="row">
          <label>
            Opacity min
            <input
              id="opacityMin"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.02"
            />
          </label>
          <label>
            Opacity max
            <input
              id="opacityMax"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.10"
            />
          </label>
        </div>

        <div class="row">
          <label>
            Opacity power
            <input id="opacityPower" type="number" min="0.1" step="0.1" value="1.4" />
          </label>
          <label>
            Rotation range (deg)
            <input id="rotRange" type="number" min="0" step="1" value="28" />
          </label>
        </div>

        <div class="row">
          <label>
            Tint A
            <input id="tintA" type="color" value="#45e092" />
          </label>
          <label>
            Tint B
            <input id="tintB" type="color" value="#66f7ff" />
          </label>
        </div>

        <label>
          Icons to use (one per line)
          <textarea
            id="icons"
            rows="9"
            spellcheck="false"
          >media/icon_bilica.png
media/icon_frambilical.png
media/icon_fruiting.png
media/icon_goodgore.png
media/icon_grabguts.png
media/icon_growthfactor.png
media/icon_haunched.png
media/icon_interiority.png
media/icon_ironbelly.png
media/icon_jellboard.png
media/icon_microchonrial.png
media/icon_nodules.png
media/icon_pinchpoint.png
media/icon_poston.png
media/icon_pustimist.png
media/icon_rotator.png
media/icon_shelled.png
media/icon_slogged.png
media/icon_snapsnapsid.png
media/icon_trembleclef.png
media/icon_wavery.png</textarea>
        </label>

        <div class="row">
          <label>
            Size bias (&gt;1 = big rarer)
            <input id="sizeBias" type="number" min="0.1" step="0.1" value="2.2" />
          </label>
          <label>
            Gap (px)
            <input id="gap" type="number" min="0" step="1" value="2" />
          </label>
        </div>

        <div class="btns">
          <button id="generate">Generate</button>
          <button id="download" class="secondary">Download PNG</button>
        </div>

        <div class="meta" id="meta"></div>
      </div>

      <div class="panel out">
        <canvas id="c"></canvas>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const canvas = $("c");
      const ctx = canvas.getContext("2d", { alpha: true });
      const meta = $("meta");

      function clamp(v, a, b) {
        return Math.min(b, Math.max(a, v));
      }

      function hexToRgb(hex) {
        const clean = hex.trim().replace("#", "");
        const full =
          clean.length === 3
            ? clean
                .split("")
                .map((c) => c + c)
                .join("")
            : clean;
        const num = Number.parseInt(full, 16);
        return {
          r: (num >> 16) & 255,
          g: (num >> 8) & 255,
          b: num & 255,
        };
      }

      function mix(a, b, t) {
        return a + (b - a) * t;
      }

      function mixColor(a, b, t) {
        const ca = hexToRgb(a);
        const cb = hexToRgb(b);
        const r = Math.round(mix(ca.r, cb.r, t));
        const g = Math.round(mix(ca.g, cb.g, t));
        const bb = Math.round(mix(ca.b, cb.b, t));
        return { r, g, b: bb };
      }

      // Simple seeded RNG (xmur3 + mulberry32)
      function xmur3(str) {
        let h = 1779033703 ^ str.length;
        for (let i = 0; i < str.length; i++) {
          h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
          h = (h << 13) | (h >>> 19);
        }
        return function () {
          h = Math.imul(h ^ (h >>> 16), 2246822507);
          h = Math.imul(h ^ (h >>> 13), 3266489909);
          return (h ^= h >>> 16) >>> 0;
        };
      }

      function mulberry32(a) {
        return function () {
          let t = (a += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function loadImages(paths) {
        return Promise.all(
          paths.map(
            (src) =>
              new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({ src, img });
                img.onerror = () => reject(new Error(`Failed to load ${src}`));
                img.src = src;
              })
          )
        );
      }

      function boxesOverlap(a, b, pad) {
        return !(
          a.x + a.w + pad <= b.x ||
          b.x + b.w + pad <= a.x ||
          a.y + a.h + pad <= b.y ||
          b.y + b.h + pad <= a.y
        );
      }

      function randBiased(rng, min, max, bias) {
        const t = Math.pow(rng(), Math.max(0.0001, bias));
        return min + (max - min) * t;
      }

      function drawTintedIcon(img, x, y, size, rot, rgba) {
        // Use an offscreen buffer so compositing doesn't affect the main canvas state.
        const buf = document.createElement("canvas");
        buf.width = Math.max(1, Math.round(size));
        buf.height = Math.max(1, Math.round(size));
        const b = buf.getContext("2d", { alpha: true });
        b.clearRect(0, 0, buf.width, buf.height);
        b.globalCompositeOperation = "source-over";
        b.drawImage(img, 0, 0, buf.width, buf.height);
        b.globalCompositeOperation = "source-in";
        b.fillStyle = `rgba(${rgba.r}, ${rgba.g}, ${rgba.b}, ${rgba.a})`;
        b.fillRect(0, 0, buf.width, buf.height);

        ctx.save();
        ctx.translate(x + size / 2, y + size / 2);
        ctx.rotate((rot * Math.PI) / 180);
        ctx.translate(-size / 2, -size / 2);
        ctx.globalCompositeOperation = "source-over";
        ctx.drawImage(buf, 0, 0, size, size);
        ctx.restore();
      }

      function parseIconList(text) {
        return text
          .split(/\r?\n/g)
          .map((l) => l.trim())
          .filter((l) => l && !l.startsWith("#") && !l.startsWith("//"));
      }

      async function generate() {
        const tileSize = Number($("tileSize").value) || 1024;
        const seed = $("seed").value || "molec";
        const minSize = Number($("minSize").value) || 18;
        const maxSize = Number($("maxSize").value) || 64;
        const coverage = clamp(Number($("coverage").value) || 0.35, 0, 1);
        const maxIcons = Number($("maxIcons").value) || 120;
        const opacityMin = clamp(Number($("opacityMin").value) || 0.02, 0, 1);
        const opacityMax = clamp(Number($("opacityMax").value) || 0.10, 0, 1);
        const opacityPower = Math.max(0.01, Number($("opacityPower").value) || 1.4);
        const rotRange = Math.max(0, Number($("rotRange").value) || 28);
        const tintA = $("tintA").value || "#45e092";
        const tintB = $("tintB").value || "#66f7ff";
        const sizeBias = Math.max(0.01, Number($("sizeBias").value) || 2.2);
        const gap = Math.max(0, Number($("gap").value) || 2);
        const iconsList = parseIconList($("icons").value || "");
        if (iconsList.length === 0) {
          throw new Error("No icons provided. Add at least one path in the Icons list.");
        }

        canvas.width = tileSize;
        canvas.height = tileSize;
        ctx.clearRect(0, 0, tileSize, tileSize);

        const seedFn = xmur3(seed);
        const rng = mulberry32(seedFn());

        const imgs = await loadImages(iconsList);
        const picked = () => imgs[Math.floor(rng() * imgs.length)].img;

        const targetArea = tileSize * tileSize * coverage;
        const placed = [];
        let filled = 0;
        let attempts = 0;
        const maxAttempts = Math.max(4000, Math.round((tileSize * tileSize) / 12));

        while (
          filled < targetArea &&
          placed.length < maxIcons &&
          attempts < maxAttempts
        ) {
          attempts++;

          const size = randBiased(rng, minSize, maxSize, sizeBias);
          const x = rng() * (tileSize - size);
          const y = rng() * (tileSize - size);

          const box = { x, y, w: size, h: size };
          let collides = false;
          for (const p of placed) {
            if (boxesOverlap(box, p, gap)) {
              collides = true;
              break;
            }
          }
          if (collides) continue;

          placed.push(box);
          filled += size * size;

          const depth = Math.pow(clamp(y / (tileSize - size), 0, 1), opacityPower);
          const alpha = opacityMin + (opacityMax - opacityMin) * depth;
          const tint = mixColor(tintA, tintB, rng());
          const rot = (rng() * 2 - 1) * rotRange;
          drawTintedIcon(picked(), x, y, size, rot, { ...tint, a: alpha });
        }

        meta.textContent = `Placed ${placed.length} icons • attempts ${attempts} • ${tileSize}×${tileSize}px • ${iconsList.length} icon files`;
      }

      function download() {
        const a = document.createElement("a");
        a.download = "molec-bg-tile.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      $("generate").addEventListener("click", () => {
        meta.textContent = "Generating…";
        generate().catch((e) => {
          meta.textContent = String(e);
          console.error(e);
        });
      });
      $("download").addEventListener("click", download);

      // Generate once on load
      generate().catch((e) => {
        meta.textContent = String(e);
        console.error(e);
      });
    </script>
  </body>
</html>
